version: '3.9'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: development
      PORT: 3001
      SOROBAN_CONTRACT_ID: ${SOROBAN_CONTRACT_ID:-}
      SOROBAN_RPC_URL: ${SOROBAN_RPC_URL:-https://rpc-futurenet.stellar.org}
    volumes:
      - ./backend/data:/app/data
      - ./backend/src:/app/src
      - /app/node_modules
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/api/health', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://localhost:3001/api
    volumes:
      - ./frontend/src:/app/src
      - /app/node_modules
    depends_on:
      backend:
        condition: service_healthy

networks:
  default:
    name: stellar-bounty-board
